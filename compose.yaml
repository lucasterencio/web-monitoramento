services:
  nginx: 
    image: nginx
    container_name: proxy
    ports:
      - 80:80
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:Z
    networks:
      - interno
 
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    container_name: nginxex
    networks:
      - interno
    depends_on:
      - nginx
    command:
      - --nginx.scrape-uri=http://nginx/stub_status

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 0s
    volumes:
      - ./pgdata:/var/lib/postgresql:Z
    networks:
      - interno


  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter
    container_name: postgresex
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks: 
      - interno

  app1: 
    image: ghcr.io/lucasterencio/exemplo-api:latest
    container_name: app1
    environment:
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
    networks: 
      - interno

  app2:
    image: ghcr.io/lucasterencio/exemplo-api:latest
    container_name: app2
    environment:
      - DB_HOST=postgres
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
    networks:
      - interno  

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:Z
      - ./prometheus:/prometheus:Z
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - interno

  grafana:
    image: grafana/grafana
    container_name: grafana
    env_file:
      - .env
    volumes:
      - ./grafana:/var/lib/grafana:Z
      - ./config/grafana/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml:Z
      - ./config/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:Z
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:Z
    networks:
      - interno

networks:
  interno:
    external: false
