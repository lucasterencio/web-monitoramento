global:
  scrape_interval:     15s
  evaluation_interval: 15s 
  scrape_timeout:      10s 
  external_labels:
    monitor: 'infrastructure-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'nginx-exporter'
    scrape_interval: 5s 
    static_configs:
      - targets: ['nginxex:9113']

  - job_name: 'postgres-exporter'
    scrape_interval: 5s 
    static_configs:
      - targets: ['postgresex:9187']

  - job_name: 'api'
    scrape_interval: 5s 
    static_configs:
      - targets: ['app1:8000', 'app2:8000']

