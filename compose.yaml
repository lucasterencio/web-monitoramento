services:
  nginx: 
    image: nginx:1.32.2  
    container_name: proxy
    ports:
      - 80:80
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - vintao
      - interno
  
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter
    env_file:
      - .env
    ports:
      - "9187:9187"
    networks:
      - interno

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - interno


networks:
  vintao:
    external: true

  interno:
    external: false
